# The main pipeline for sony_dev

resources:
  pipelines:
    sony_dev_etl:
      name: sony_dev_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/sony_dev_etl"

      libraries:
        - glob:
            include: ../src/sony_dev_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
